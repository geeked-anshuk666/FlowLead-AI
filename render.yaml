services:
  # Next.js Frontend
  - type: web
    name: groweasy-frontend
    runtime: node
    rootDir: frontend
    buildCommand: npm install && npm run build
    startCommand: npm run start
    envVars:
      - key: BACKEND_HOST
        fromService:
          name: groweasy-backend
          type: web
          property: host
      - key: NEXT_PUBLIC_API_BASE
        value: ${BACKEND_HOST}/api

  # Express Backend Web Service
  - type: web
    name: groweasy-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install && npm run build
    startCommand: npm run start
    envVars:
      - key: PORT
        value: 5000
      - key: DATABASE_URL
        fromDatabase:
          name: groweasy-db
          property: connectionString
      - key: GEMINI_API_KEY
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false

databases:
  - name: groweasy-db
    plan: free
